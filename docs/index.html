<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We'll Be Right Back</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at center, #ffffff 0%, #f3f4f6 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #1a1a1a;
            text-align: center;
        }

        .container {
            padding: 2rem;
            max-width: 500px;
        }

        .status-pulse {
            width: 12px;
            height: 12px;
            background-color: #10b981;
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            position: relative;
        }

        .status-pulse::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #10b981;
            border-radius: 50%;
            animation: pulse 2s infinite;
            left: 0;
            top: 0;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }

        p {
            font-size: 1.1rem;
            color: #6b7280;
            line-height: 1.6;
        }

        .divider {
            width: 40px;
            height: 2px;
            background: #e5e7eb;
            margin: 2rem auto;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(3); opacity: 0; }
        }

        /* Subtle fade in for the whole content */
        .container {
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="status-pulse"></div>
        <h1>Under Maintenance</h1>
        <p>We will be back after accessibility checks.</p>
        
        <div class="divider"></div>
        
        <p style="font-size: 0.9rem; font-style: italic;">
            Thank you for your patience.
        </p>
    </div>

</body>
</html>
